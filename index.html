<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <header>
        <div class="container">
          <h1 id="logo">The Curated Shelf</h1>
          <button id="add-book">Add book</button>
        </div>
      </header>
      <main>
        <div class="container">
          <hr />
          <div class="card-grid">
            <!-- <div class="card-content">
              <h2>Harry Potter</h2>
              <p><span>by: </span> JK Rowling</p>
              <p><span>pages: </span>200</p>
              <p><span>status: </span>Not read</p>
              <div class="card-btn">
                <button><span>change status</span></button>
                <button><span>delete</span></button>
              </div>
            </div> -->
          </div>
          <dialog>
            <form method="dialog">
              <legend>Add new book</legend>
              <p>
                <label for="title">Title</label>
                <input type="text" name="title" id="title" required />
              </p>
              <p>
                <label for="author">Author</label>
                <input type="text" name="author" id="author" required/>
              </p>
              <p>
                <label for="pages">Pages</label>
                <input type="number" name="pages" id="pages" required />
              </p>
              <p>
                <label for="status">Status</label>
                <input type="text" name="status" id="status" required/>
              </p>
              <div>
                <button type="submit" id="confirm-btn">Confirm</button>
                <button id="cancel-btn">Cancel</button>
              </div>
            </form>
          </dialog>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
